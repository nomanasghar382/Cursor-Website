name: QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Unit tests with coverage
        working-directory: backend
        run: npm run test:cov
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-with-more-than-twenty-four-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-with-more-than-twenty-four-characters
          COOKIE_SECRET: ci-cookie-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_SECRET: ci-better-auth-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_URL: http://localhost:4000
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci
          MAIL_FROM: NOVAEX <ci@novaex.ai>
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: novaex
          POSTGRES_USER: novaex_user
          POSTGRES_PASSWORD: novaex_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U novaex_user -d novaex"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            database/package-lock.json
      - name: Install database dependencies
        working-directory: database
        run: npm ci
      - name: Migrate and seed test database
        working-directory: database
        run: |
          npm run migrate:deploy
          npm run seed
        env:
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Build backend
        working-directory: backend
        run: npm run build
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-with-more-than-twenty-four-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-with-more-than-twenty-four-characters
          COOKIE_SECRET: ci-cookie-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_SECRET: ci-better-auth-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_URL: http://localhost:4000
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci
          MAIL_FROM: NOVAEX <ci@novaex.ai>
          ENABLE_TEST_PAYMENT_SIMULATION: "true"
          STRIPE_PUBLISHABLE_KEY: pk_test_ci
      - name: Integration tests
        working-directory: backend
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-with-more-than-twenty-four-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-with-more-than-twenty-four-characters
          COOKIE_SECRET: ci-cookie-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_SECRET: ci-better-auth-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_URL: http://localhost:4000
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci
          MAIL_FROM: NOVAEX <ci@novaex.ai>
          ENABLE_TEST_PAYMENT_SIMULATION: "true"
          STRIPE_PUBLISHABLE_KEY: pk_test_ci

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests with coverage
        working-directory: frontend
        run: npm run test:cov
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  api-newman:
    needs: backend-integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: novaex
          POSTGRES_USER: novaex_user
          POSTGRES_PASSWORD: novaex_password
        ports:
          - 5432:5432
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          npm ci --prefix database
          npm ci --prefix backend
          npm install -g newman
      - name: Prepare database
        working-directory: database
        run: |
          npm run migrate:deploy
          npm run seed
        env:
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
      - name: Start API server
        working-directory: backend
        run: |
          npm run build
          npm run start &
          sleep 8
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-with-more-than-twenty-four-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-with-more-than-twenty-four-characters
          COOKIE_SECRET: ci-cookie-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_SECRET: ci-better-auth-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_URL: http://localhost:4000
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci
          MAIL_FROM: NOVAEX <ci@novaex.ai>
      - name: Run Newman collection
        run: ./tests/scripts/run-newman.sh

  performance-smoke:
    needs: backend-integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: novaex
          POSTGRES_USER: novaex_user
          POSTGRES_PASSWORD: novaex_password
        ports:
          - 5432:5432
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Boot API and run performance smoke
        run: |
          npm ci --prefix database
          npm ci --prefix backend
          cd database && npm run migrate:deploy && npm run seed
          cd ../backend && npm run build
          npm run start &
          sleep 8
          node tests/performance/api-smoke.mjs
        env:
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-with-more-than-twenty-four-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-with-more-than-twenty-four-characters
          COOKIE_SECRET: ci-cookie-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_SECRET: ci-better-auth-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_URL: http://localhost:4000
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          RESEND_API_KEY: re_ci
          MAIL_FROM: NOVAEX <ci@novaex.ai>

  playwright-e2e:
    needs: backend-integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: novaex
          POSTGRES_USER: novaex_user
          POSTGRES_PASSWORD: novaex_password
        ports:
          - 5432:5432
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Playwright browser
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true
          DATABASE_URL: postgresql://novaex_user:novaex_password@localhost:5432/novaex?schema=public
          ENABLE_TEST_PAYMENT_SIMULATION: "true"
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          STRIPE_PUBLISHABLE_KEY: pk_test_ci
          JWT_ACCESS_SECRET: ci-access-secret-with-more-than-twenty-four-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-with-more-than-twenty-four-characters
          COOKIE_SECRET: ci-cookie-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_SECRET: ci-better-auth-secret-with-more-than-twenty-four-characters
          BETTER_AUTH_URL: http://localhost:4000
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          RESEND_API_KEY: re_ci
          MAIL_FROM: NOVAEX <ci@novaex.ai>
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/reports/playwright/
