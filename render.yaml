# NOVAEX backend on Render (Docker) + Postgres + Redis
# Deploy: Render Dashboard -> New -> Blueprint -> connect this repo

databases:
  - name: novaex-db
    databaseName: novaex
    user: novaex
    plan: free
    ipAllowList: []

services:
  - type: keyvalue
    name: novaex-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: novaex-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEED
        value: "false"
      - key: AUTO_FIX_FAILED_MIGRATIONS
        value: "false"
      - key: ENABLE_TEST_PAYMENT_SIMULATION
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: novaex-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: novaex-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: novaex-redis
          property: port
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: http://localhost:3000
      - key: WEB_ORIGINS
        value: http://localhost:3000
      - key: CLOUDINARY_CLOUD_NAME
        value: demo
      - key: CLOUDINARY_API_KEY
        value: demo-key
      - key: CLOUDINARY_API_SECRET
        value: demo-secret
      - key: STRIPE_SECRET_KEY
        value: sk_test_render_placeholder
      - key: STRIPE_WEBHOOK_SECRET
        value: whsec_render_placeholder
      - key: STRIPE_PUBLISHABLE_KEY
        value: pk_test_render_placeholder
      - key: RESEND_API_KEY
        value: re_render_placeholder
      - key: MAIL_FROM
        value: NOVAEX <no-reply@novaex.ai>
